site_name: Azin
site_url: https://docs.azin-lang.org

theme:
  name: material
  logo: assets/favicon.png
  favicon: assets/favicon.png

  palette:
    - scheme: slate
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
        
    - scheme: default
      primary: blue
      accent: blue
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
        
  features:
    - navigation.sections
    - navigation.expand
    - navigation.top
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - search.highlight
    - search.suggest
    - toc.follow

markdown_extensions:
  - attr_list
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
      use_pygments: true

  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.snippets

extra_css:
  - stylesheet/extra.css

extra:
  generator: false

nav:
nav:
  - Home: index.md

  - Std:
      - Overview: std/index.md

  - Language:
      - Overview: language/index.md

      - Syntax:
          - Overview: language/syntax/index.md
          - Functions: language/syntax/functions.md
          - Variables: language/syntax/variables.md
