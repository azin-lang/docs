{% extends "base.html" %}

{% block extrahead %}
  {{ super() }}
  <script>
    (function() {
      try {
        var keys = Object.keys(localStorage);
        for (var i = 0; i < keys.length; i++) {
          var key = keys[i];
          if (key === "__palette" || key.endsWith(".__palette")) {
            var val = localStorage.getItem(key);
            if (val) {
              var parsed = JSON.parse(val);
              if (typeof parsed !== "object" || parsed === null || typeof parsed.index !== "number" || isNaN(parsed.index)) {
                localStorage.removeItem(key);
              }
            }
          }
        }
      } catch(e) {}
    })();
  </script>
{% endblock %}
